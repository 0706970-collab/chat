<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Big Screen Chat</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #0a0a0f;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    #header {
      background: #12121f;
      padding: 18px;
      text-align: center;
      font-size: 28px;
      font-weight: bold;
      border-bottom: 3px solid #444466;
      color: #ddddee;
    }
    #screen {
      flex: 1;
      background: #0f0f1a;
      padding: 25px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
      font-size: 18px;
      line-height: 1.5;
    }
    .message {
      max-width: 75%;
      padding: 14px 20px;
      border-radius: 16px;
      background: #1c1c2e;
      align-self: flex-start;
      box-shadow: 0 3px 10px rgba(0,0,0,0.5);
    }
    .message.me {
      align-self: flex-end;
      background: #2a2a45;
    }
    .name {
      font-weight: bold;
      font-size: 15px;
      margin-bottom: 6px;
      color: #aaaacc;
    }
    #input-area {
      background: #12121f;
      padding: 18px;
      display: flex;
      gap: 12px;
      border-top: 3px solid #444466;
    }
    #message-input {
      flex: 1;
      padding: 16px 20px;
      font-size: 18px;
      border: none;
      border-radius: 14px;
      background: #1c1c2e;
      color: #e0e0e0;
    }
    #message-input:focus {
      outline: 3px solid #666699;
    }
    button {
      padding: 16px 32px;
      font-size: 18px;
      background: #3a3a5c;
      color: #eee;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      font-weight: bold;
    }
    button:hover {
      background: #4a4a7a;
    }
    .system {
      align-self: center;
      background: #22223a;
      padding: 12px 24px;
      border-radius: 30px;
      font-style: italic;
      font-size: 16px;
      color: #9999bb;
    }
  </style>
</head>
<body>

  <div id="header">Big Screen Chat</div>
  <div id="screen"></div>

  <div id="input-area">
    <input type="text" id="message-input" placeholder="Type message and press Enter..." autocomplete="off">
    <button onclick="sendMessage()">Send</button>
  </div>

  <script>
    // ==================== YOUR SUPABASE SETTINGS ====================
    const SUPABASE_URL = "https://txxinlnngrhkheawtfsk.supabase.co";
    const SUPABASE_ANON_KEY = "esb_publishable_IqJaMre9t4ySYsNqDZ38eg_ksJRIpXR";

    const { createClient } = Supabase;
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let myName = localStorage.getItem('bigChatName') || '';

    const screen = document.getElementById('screen');
    const input = document.getElementById('message-input');

    function askForName() {
      if (!myName) {
        myName = prompt("Enter your name for the chat:") || "Guest";
        if (myName.trim() === "") myName = "Guest";
        localStorage.setItem('bigChatName', myName);
      }
    }

    function addMessage(name, text, isMe = false) {
      const div = document.createElement('div');
      div.className = `message ${isMe ? 'me' : ''}`;
      div.innerHTML = `<div class="name">${name}</div><div>${text}</div>`;
      screen.appendChild(div);
      screen.scrollTop = screen.scrollHeight;
    }

    function addSystem(text) {
      const div = document.createElement('div');
      div.className = 'message system';
      div.textContent = text;
      screen.appendChild(div);
      screen.scrollTop = screen.scrollHeight;
    }

    // Send message
    async function sendMessage() {
      const text = input.value.trim();
      if (!text) return;

      askForName();

      const { error } = await supabase
        .from('messages')
        .insert({ name: myName, text: text });

      if (error) {
        console.error(error);
        addSystem("Failed to send: " + error.message);
      } else {
        input.value = '';
      }
    }

    // Real-time listener
    function listenToMessages() {
      supabase
        .channel('big-chat')
        .on(
          'postgres_changes',
          { event: 'INSERT', schema: 'public', table: 'messages' },
          (payload) => {
            const msg = payload.new;
            const isMe = msg.name === myName;
            addMessage(msg.name, msg.text, isMe);
          }
        )
        .subscribe((status) => {
          if (status === 'SUBSCRIBED') {
            addSystem("✅ Connected - You can now chat across devices");
          }
        });
    }

    // Load previous messages
    async function loadMessages() {
      const { data, error } = await supabase
        .from('messages')
        .select('*')
        .order('created_at', { ascending: true });

      if (error) {
        console.error(error);
      } else if (data) {
        data.forEach(msg => {
          addMessage(msg.name, msg.text, msg.name === myName);
        });
      }
    }

    // Enter key support
    input.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') sendMessage();
    });

    // Konami code: Up ↑ Up ↑ Down ↓ Down ↓  to clear screen
    let konamiCode = [];
    const konamiSequence = ['ArrowUp', 'ArrowUp', 'ArrowDown', 'ArrowDown'];

    document.addEventListener('keydown', (e) => {
      konamiCode.push(e.key);
      if (konamiCode.length > 4) konamiCode.shift();

      if (JSON.stringify(konamiCode) === JSON.stringify(konamiSequence)) {
        if (confirm("Clear the big screen for everyone?")) {
          supabase.from('messages').delete().neq('id', 0);
          screen.innerHTML = '';
          addSystem(`Screen cleared by ${myName}`);
        }
        konamiCode = [];
      }
    });

    // Start everything
    window.onload = async () => {
      askForName();
      addSystem(`Welcome, ${myName}!`);

      await loadMessages();
      listenToMessages();
    };
  </script>
</body>
</html>
