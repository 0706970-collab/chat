<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #0a0a0f;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    #header {
      background: #12121f;
      padding: 18px;
      text-align: center;
      font-size: 28px;
      font-weight: bold;
      border-bottom: 3px solid #444466;
      color: #ddddee;
    }
    #screen {
      flex: 1;
      background: #0f0f1a;
      padding: 25px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
      font-size: 18px;
      line-height: 1.5;
    }
    .message {
      max-width: 75%;
      padding: 14px 20px;
      border-radius: 16px;
      background: #1c1c2e;
      align-self: flex-start;
      box-shadow: 0 3px 10px rgba(0,0,0,0.5);
    }
    .message.me {
      align-self: flex-end;
      background: #2a2a45;
    }
    .name {
      font-weight: bold;
      font-size: 15px;
      margin-bottom: 6px;
      color: #aaaacc;
    }
    #input-area {
      background: #12121f;
      padding: 18px;
      display: flex;
      gap: 12px;
      border-top: 3px solid #444466;
    }
    #message-input {
      flex: 1;
      padding: 16px 20px;
      font-size: 18px;
      border: none;
      border-radius: 14px;
      background: #1c1c2e;
      color: #e0e0e0;
    }
    #message-input:focus {
      outline: 3px solid #666699;
    }
    button {
      padding: 16px 32px;
      font-size: 18px;
      background: #3a3a5c;
      color: #eee;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      font-weight: bold;
    }
    button:hover {
      background: #4a4a7a;
    }
    .system {
      align-self: center;
      background: #22223a;
      padding: 12px 24px;
      border-radius: 30px;
      font-style: italic;
      font-size: 16px;
      color: #9999bb;
    }
  </style>
</head>
<body>

  <div id="header">Chat</div>
  <div id="screen"></div>

  <div id="input-area">
    <input type="text" id="message-input" placeholder="Type your message and press Enter..." autocomplete="off">
    <button onclick="sendMessage()">Send</button>
  </div>

  <script>
    let myName = '';
    let messages = JSON.parse(localStorage.getItem('bigChatMessages') || '[]');
    let konamiCode = [];
    const konamiSequence = ['ArrowUp', 'ArrowUp', 'ArrowDown', 'ArrowDown'];

    const screen = document.getElementById('screen');
    const input = document.getElementById('message-input');

    function askForName() {
      myName = prompt("Enter your name for the chat:") || "Guest";
      if (myName.trim() === "") myName = "Guest";
    }

    function addMessage(name, text, isMe) {
      const div = document.createElement('div');
      div.className = `message ${isMe ? 'me' : ''}`;
      div.innerHTML = `<div class="name">${name}</div><div>${text}</div>`;
      screen.appendChild(div);
      screen.scrollTop = screen.scrollHeight;
    }

    function addSystem(text) {
      const div = document.createElement('div');
      div.className = 'message system';
      div.textContent = text;
      screen.appendChild(div);
      screen.scrollTop = screen.scrollHeight;
    }

    function sendMessage() {
      const text = input.value.trim();
      if (!text) return;

      if (!myName) askForName();

      const msg = { name: myName, text: text };
      messages.push(msg);
      localStorage.setItem('bigChatMessages', JSON.stringify(messages));

      addMessage(myName, text, true);
      input.value = '';
    }

    function loadMessages() {
      screen.innerHTML = '';
      messages.forEach(msg => {
        addMessage(msg.name, msg.text, msg.name === myName);
      });
    }

    function clearScreen() {
      if (confirm("Clear the entire big screen?")) {
        messages = [];
        localStorage.setItem('bigChatMessages', '[]');
        screen.innerHTML = '';
        addSystem(`Screen cleared by ${myName}`);
      }
    }

    // Konami code
    document.addEventListener('keydown', (e) => {
      konamiCode.push(e.key);
      if (konamiCode.length > 4) konamiCode.shift();
      if (JSON.stringify(konamiCode) === JSON.stringify(konamiSequence)) {
        clearScreen();
        konamiCode = [];
      }
    });

    // Enter key
    input.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') sendMessage();
    });

    // Start the app
    window.onload = () => {
      askForName();
      loadMessages();
      addSystem(`Welcome, ${myName}! Type below and hit Enter or Send.`);
    };
  </script>
</body>
</html>
